<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Legacy</title>

<style>

body{
margin:0;
font-family:Arial;
background:#000;
color:#fff;
transition:0.3s;
}

/* PARTICLES BACKGROUND */

#particles-js{
position:fixed;
width:100%;
height:100%;
z-index:-1;
top:0;
left:0;
}

/* LIGHT MODE */

.light{
background:#fff;
color:#000;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:8px 40px;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
border-bottom:1px solid #111;
position:fixed;
top:0;
width:100%;
z-index:1000;
}

/* LOGO */

.logo{
height:90px;
width:auto;
}

/* MENU */

.menu{
display:flex;
gap:40px;
font-size:20px;
}

.menu a{
color:inherit;
text-decoration:none;
}

.menu a:hover{
color:#f0b90b;
}

/* BUTTONS */

.buttons{
display:flex;
gap:10px;
}

.icon-btn{
width:40px;
height:40px;
border-radius:10px;
border:1px solid #333;
background:#111;
color:white;
font-size:18px;
cursor:pointer;
}

.light .icon-btn{
background:#eee;
color:black;
border:1px solid #ccc;
}

/* HERO */

.hero-logo{
width:600px;
height:auto;
display:block;
margin:auto;
margin-bottom:20px;
}

.hero{
text-align:center;
padding:170px 20px 60px 20px;
}

.hero h1{
font-size:48px;
margin-bottom:10px;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:50px;
max-width:1100px;
margin:auto;
padding:40px;
}

.card{
background:#111;
border-radius:15px;
padding:20px;
text-align:center;
}

.light .card{
background:#f2f2f2;
}

.card img{
width:100%;
height:180px;
background:#000;
border:1px solid #333;
border-radius:8px;
}

.card button{
background:#f0b90b;
border:none;
padding:10px 20px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
margin-top:10px;
}

footer{
text-align:center;
padding:40px;
}

</style>

</head>

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

<script>

particlesJS("particles-js",{

particles:{
number:{value:90},
color:{value:"#ffffff"},
shape:{type:"circle"},
opacity:{value:0.5},
size:{value:3},
line_linked:{
enable:true,
distance:150,
color:"#ffffff",
opacity:0.4,
width:1
},
move:{
enable:true,
speed:2
}
},

interactivity:{
detect_on:"canvas",
events:{
onhover:{
enable:true,
mode:"grab"
},
onclick:{
enable:true,
mode:"push"
}
},
modes:{
grab:{
distance:160,
line_linked:{opacity:1}
},
push:{
particles_nb:4
}
}
}

})

function toggleTheme(){
document.body.classList.toggle("light")
}

let lang="en"

function toggleLang(){

lang = lang==="en" ? "ar":"en"

document.querySelectorAll("[data-en]").forEach(el=>{
el.innerText = el.dataset[lang]
})

if(lang==="ar"){
document.body.dir="rtl"
}else{
document.body.dir="ltr"
}

}

function searchSite(){

let q = prompt("Search product name...")

if(!q) return

q = q.toLowerCase()

let cards = document.querySelectorAll(".card")

cards.forEach(card=>{

let title = card.querySelector("h3").innerText.toLowerCase()

if(title.includes(q)){
card.style.display="block"
}else{
card.style.display="none"
}

})

}

function notify(){
alert("No new notifications")
}

function help(){
alert("Help center coming soon")
}

/* BUY PRODUCT */

function buyProduct(product,image){

let page="LegacyStore"

let msg=encodeURIComponent(
"مرحبا اريد شراء هذا المنتج:\n"+product+"\nصورة المنتج:\n"+window.location.origin+"/"+image
)

window.open("https://m.me/"+page+"?ref="+msg,"_blank")

}
function showAll(){

let cards = document.querySelectorAll(".card")

cards.forEach(card=>{
card.style.display="block"
})

}
</script>
